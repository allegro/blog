name: Build and when ready deploy to gh-pages
on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: [ ubuntu-latest, "${{ github.repository_owner == 'allegro-internal' && 'self-hosted' || '' }}" ]
    env:
      JEKYLL_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        if:  ${{ github.repository_owner != 'allegro-internal' && github.ref == 'refs/heads/main' }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - run: gem update --system
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: bundle install
      - run: bundle exec jekyll build
      - uses: allegro-actions/dependabot-automerge@v1
  prepare-artifact:
    if:  ${{ github.repository_owner != 'allegro-internal' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/upload-pages-artifact@v3
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: prepare-artifact
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
